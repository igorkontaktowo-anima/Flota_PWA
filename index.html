<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#01696f" />
  <title>Flota PWA</title>
  <!--
    manifest.json musi mieć: "start_url": "./app.html"
    index.html to tylko bramka QR → token → app.html
    Android przy kolejnych uruchomieniach startuje bezpośrednio app.html
  -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <style>
    :root {
      --bg:#f7f6f2; --surface:#f9f8f5; --border:rgba(40,37,29,.12);
      --text:#28251d; --muted:#7a7974; --faint:#bab9b4;
      --primary:#01696f; --err:#a12c7b; --err-bg:#f9f0f5;
      --shadow:0 4px 20px rgba(40,37,29,.09);
      --font:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    }
    @media(prefers-color-scheme:dark){:root{
      --bg:#171614;--surface:#1c1b19;--border:rgba(205,204,202,.1);
      --text:#cdccca;--muted:#797876;--faint:#5a5957;
      --primary:#4f98a3;--err:#d163a7;--err-bg:#2a1a24;
      --shadow:0 4px 20px rgba(0,0,0,.38);
    }}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100dvh;font-family:var(--font);background:var(--bg);
      color:var(--text);display:flex;align-items:center;
      justify-content:center;padding:1.5rem 1rem}
    .card{width:100%;max-width:360px;background:var(--surface);
      border:1px solid var(--border);border-radius:1rem;
      box-shadow:var(--shadow);padding:2rem 2rem 2.5rem;
      animation:up .4s cubic-bezier(.16,1,.3,1) both}
    @keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .logo{display:flex;align-items:center;gap:.625rem;margin-bottom:2rem}
    .logo-name{font-size:1.1rem;font-weight:700}
    .logo-sub{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
    #stateLoading{display:flex;flex-direction:column;align-items:center;gap:1.25rem;text-align:center}
    .spinner{width:46px;height:46px;border:3px solid var(--border);
      border-top-color:var(--primary);border-radius:50%;
      animation:spin .85s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner-label{font-size:.9375rem;color:var(--muted)}
    #stateError{display:none;flex-direction:column;align-items:center;gap:1rem;text-align:center}
    .err-icon{width:54px;height:54px;border-radius:50%;background:var(--err-bg);
      display:flex;align-items:center;justify-content:center;color:var(--err)}
    .err-title{font-size:1.0625rem;font-weight:600}
    .err-msg{font-size:.875rem;color:var(--muted);max-width:28ch;line-height:1.6}
    .err-note{font-size:.8125rem;color:var(--faint);background:var(--border);
      border-radius:.5rem;padding:.625rem 1rem;line-height:1.55}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="42" height="42" viewBox="0 0 42 42" fill="none" style="flex-shrink:0;color:var(--primary)">
      <rect width="42" height="42" rx="11" fill="currentColor" opacity=".1"/>
      <rect x="6" y="18" width="26" height="11" rx="2.5" fill="currentColor"/>
      <path d="M19 18V13Q19 12 20 12H28Q32 12 32 15.5V18Z" fill="currentColor"/>
      <rect x="20.5" y="13" width="9" height="4" rx="1.5" fill="white" opacity=".45"/>
      <circle cx="13" cy="29" r="3.5" fill="var(--bg)" stroke="currentColor" stroke-width="1.8"/>
      <circle cx="28" cy="29" r="3.5" fill="var(--bg)" stroke="currentColor" stroke-width="1.8"/>
      <rect x="8.5" y="20.5" width="7" height="2.2" rx="1.1" fill="white" opacity=".65"/>
      <rect x="11.4" y="17.8" width="2.2" height="7.5" rx="1.1" fill="white" opacity=".65"/>
    </svg>
    <div>
      <div class="logo-name">Flota PWA</div>
      <div class="logo-sub">Panel kuriera</div>
    </div>
  </div>
  <div id="stateLoading" role="status" aria-live="polite">
    <div class="spinner" aria-hidden="true"></div>
    <span class="spinner-label">Weryfikacja dostępu…</span>
  </div>
  <div id="stateError" role="alert" aria-live="assertive">
    <div class="err-icon" aria-hidden="true">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <circle cx="12" cy="16" r=".5" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <p class="err-title">Brak dostępu</p>
    <p class="err-msg">Aby uruchomić aplikację, zeskanuj kod QR.</p>
    <p class="err-note">Jeśli nie masz kodu QR, skontaktuj się z administratorem.</p>
  </div>
</div>

<script>
(function(){
  'use strict';

  // !! Musi być identyczna jak w app.html !!
  var DB_NAME = 'flotaDB';
  var DB_VER  = 1;
  var APP     = './app.html';

  function openDB(){
    return new Promise(function(resolve,reject){
      var r=indexedDB.open(DB_NAME,DB_VER);
      r.onupgradeneeded=function(e){
        var db=e.target.result;
        if(!db.objectStoreNames.contains('session'))
          db.createObjectStore('session',{keyPath:'key'});
      };
      r.onsuccess=function(e){resolve(e.target.result);};
      r.onerror=function(e){reject(e.target.error);};
    });
  }

  function saveToken(token){
    return openDB().then(function(db){
      return new Promise(function(resolve,reject){
        var tx=db.transaction('session','readwrite');
        var r=tx.objectStore('session').put({key:'token',token:token});
        r.onsuccess=function(){resolve();};
        r.onerror=function(){reject(r.error);};
      });
    });
  }

  function registerSW(){
    if('serviceWorker' in navigator)
      navigator.serviceWorker.register('./sw.js').catch(function(){});
  }

  function goApp(token){
    window.location.replace(APP+(token?'?t='+encodeURIComponent(token):''));
  }

  registerSW();

  var t=(new URLSearchParams(location.search)).get('t');

  if(t&&t.trim()){
    // Wejście przez link QR — zapisz token i przejdź
    saveToken(t.trim())
      .then(function(){goApp(t.trim());})
      .catch(function(){goApp(t.trim());});
  } else {
    // Brak tokenu w URL — przekaż do app.html, tam sprawdzi IndexedDB
    setTimeout(function(){goApp(null);},100);
  }

})();
</script>
</body>
</html>
