<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000080">
  <link rel="manifest" href="manifest.json">
  <title>Flota PWA</title>
  <style>
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000080;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .splash {
      text-align: center;
      color: #fff;
    }
    .splash img {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }
    .splash h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0 0 .5rem;
      letter-spacing: .5px;
    }
    .splash p {
      font-size: .95rem;
      opacity: .75;
      margin: 0;
    }
    .error-box {
      display: none;
      margin-top: 2rem;
      background: rgba(255,255,255,.15);
      border-radius: .75rem;
      padding: 1rem 1.5rem;
      font-size: .9rem;
      max-width: 280px;
      line-height: 1.5;
    }
    .error-box.show { display: block; }
  </style>
</head>
<body>
  <div class="splash">
    <img src="./icons/icon-192.png" alt="Flota PWA">
    <h1>Flota PWA</h1>
    <p id="status-msg">Sprawdzam dostęp…</p>
    <div class="error-box" id="error-box">
      Brak tokenu dostępu.<br><br>
      Otwórz aplikację przez link otrzymany od dyspozytora.
    </div>
  </div>

<script type="module">
  import { resolveSession } from './js/auth.js';

  // Rejestracja Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
      .catch(e => console.warn('[SW]', e));
  }

  (async () => {
    const session = await resolveSession();

    if (session && session.token) {
      document.getElementById('status-msg').textContent = 'Wczytuję aplikację…';
      // Przekieruj do głównej aplikacji zachowując token w URL
      // (app.html sama odczyta token z IndexedDB)
      window.location.replace('./app.html');
    } else {
      document.getElementById('status-msg').textContent = 'Brak dostępu';
      document.getElementById('error-box').classList.add('show');
    }
  })();
</script>
</body>
</html>
